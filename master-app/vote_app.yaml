apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: master-app
  namespace: argocd
spec:
  project: argocd-project
  source: 
    repoURL: https://github.com/Jagdeep786-ctrl/Multi-applications-with-agocd.git
    targetRevision: main
    path: k8s-kind-voting-app/manifests.yaml
  destination: 
    server:
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true  